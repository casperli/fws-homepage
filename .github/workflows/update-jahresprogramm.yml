name: Update Jahresprogramm

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Jahresprogramm JSON
        env:
          FEED_URL: ${{ secrets.JAHRESPROGRAMM_FEED_URL }}
        run: |
          if [ -z "$FEED_URL" ]; then
            echo "::error::JAHRESPROGRAMM_FEED_URL secret is not set"
            exit 1
          fi
          curl -sf "$FEED_URL" -o data/jahresprogramm.json
          echo "Fetched jahresprogramm.json"

      - name: Commit and push if changed
        run: |
          git diff --quiet data/ && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jahresprogramm.json
          git commit -m "Update Jahresprogramm data"
          git push
