{{ define "main" }}
<div class="page-content prose">
  <h1 class="page-title">{{ .Title }}</h1>
  {{ .Content }}
</div>
{{ end }}

{{ define "scripts" }}
{{ with .Params.calendar_url }}
<script>
  (function() {
    var calendarUrl = {{ . }};
    var container = document.getElementById('external-calendar');
    if (!container || !calendarUrl) return;

    fetch(calendarUrl)
      .then(function(r) { return r.json(); })
      .then(function(events) {
        container.innerHTML = events.map(function(e) {
          return '<div style="padding:0.75rem 0;border-bottom:1px solid #e5e7eb">'
            + '<span style="font-size:0.875rem;color:#6b7280">' + e.date + '</span>'
            + '<p style="font-weight:500">' + e.title + '</p>'
            + '</div>';
        }).join('');
      })
      .catch(function() {
        container.innerHTML = '<p style="color:#6b7280">Kalender konnte nicht geladen werden.</p>';
      });
  })();
</script>
{{ end }}
{{ end }}
