{{ define "main" }}
<div class="page-content">
  <h1 class="page-title">{{ .Title }}</h1>
  {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  <div class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <article>
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ with .Summary }}<p>{{ . }}</p>{{ end }}
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
