<header class="header">
  <div class="header-inner">
    <button id="menu-toggle" class="menu-toggle" aria-label="Menu">
      <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <nav id="main-nav" class="main-nav">
      {{- range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} nav-link-active{{ end }}">
          {{ .Name }}
        </a>
      {{- end }}
    </nav>
    <a href="{{ "/" | relURL }}" class="logo-link">
      {{ with resources.Get "images/logo.png" }}
        <img src="{{ .RelPermalink }}" alt="Feuerwehr Schwerzenbach" class="logo">
      {{ else }}
        <img src="{{ "images/logo.png" | relURL }}" alt="Feuerwehr Schwerzenbach" class="logo">
      {{ end }}
    </a>
  </div>
  <nav id="mobile-nav" class="mobile-nav">
    {{- range .Site.Menus.main }}
      <a href="{{ .URL }}" class="mobile-nav-link{{ if $.IsMenuCurrent "main" . }} nav-link-active{{ end }}">{{ .Name }}</a>
    {{- end }}
  </nav>
</header>
