{{ define "main" }}
<div class="page-content">
  <h1 class="page-title">{{ .Title }}</h1>
  {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  <div class="vehicle-grid">
    {{ range .Pages.ByWeight }}
    <a href="{{ .RelPermalink }}" class="vehicle-card">
      {{ with .Params.image }}
      <img src="{{ (strings.TrimLeft "/" .) | absURL }}" alt="{{ $.Title }}">
      {{ end }}
      <div class="vehicle-card-body">
        <h2>{{ .Title }}</h2>
        {{ with .Params.vehicle_type }}<p>{{ . }}</p>{{ end }}
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
