{{ define "main" }}
<h1 class="text-3xl font-bold mb-6">{{ .Title }}</h1>
{{ .Content }}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  {{ range .Pages.ByWeight }}
  <a href="{{ .RelPermalink }}" class="block bg-white rounded-lg shadow hover:shadow-lg transition-shadow overflow-hidden no-underline text-gray-900">
    {{ with .Params.image }}
    <img src="{{ . | relURL }}" alt="{{ $.Title }}" class="w-full h-48 object-cover">
    {{ end }}
    <div class="p-4">
      <h2 class="text-lg font-semibold">{{ .Title }}</h2>
      {{ with .Params.vehicle_type }}<p class="text-sm text-gray-500">{{ . }}</p>{{ end }}
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
