{{ define "main" }}
<article>
  <a href="{{ "fahrzeuge/" | relURL }}" class="text-primary hover:underline text-sm">&larr; Alle Fahrzeuge</a>
  <h1 class="text-3xl font-bold mt-2 mb-6">{{ .Title }}</h1>
  {{ with .Params.image }}
  <img src="{{ . | relURL }}" alt="{{ $.Title }}" class="w-full rounded-lg shadow mb-6">
  {{ end }}
  {{ if .Params.specs }}
  <div class="bg-gray-50 rounded-lg p-4 mb-6">
    <h2 class="text-lg font-semibold mb-3">Technische Daten</h2>
    <dl class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-2">
      {{ range $key, $value := .Params.specs }}
      <div class="flex justify-between sm:block">
        <dt class="text-sm text-gray-500">{{ $key }}</dt>
        <dd class="font-medium">{{ $value }}</dd>
      </div>
      {{ end }}
    </dl>
  </div>
  {{ end }}
  <div class="prose max-w-none">
    {{ .Content }}
  </div>
</article>
{{ end }}
