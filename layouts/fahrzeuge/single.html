{{ define "main" }}
<div class="page-content">
  <a href="{{ "fahrzeuge/" | relURL }}" class="back-link">&larr; Alle Fahrzeuge</a>
  <h1 class="page-title">{{ .Title }}</h1>
  {{ with .Params.image }}
  <img src="{{ . | relURL }}" alt="{{ $.Title }}" style="width:100%;border-radius:0.5rem;margin-bottom:1.5rem;">
  {{ end }}
  {{ if .Params.specs }}
  <div class="specs-table">
    <h2>Technische Daten</h2>
    <dl class="specs-grid">
      {{ range $key, $value := .Params.specs }}
      <div>
        <dt>{{ $key }}</dt>
        <dd>{{ $value }}</dd>
      </div>
      {{ end }}
    </dl>
  </div>
  {{ end }}
  <div class="prose">
    {{ .Content }}
  </div>
</div>
{{ end }}
