{{ define "main" }}
<h1 class="text-3xl font-bold mb-6">{{ .Title }}</h1>
{{ .Content }}
{{ range .Pages.ByDate.Reverse }}
<article class="mb-6 pb-6 border-b border-gray-200">
  <h2 class="text-xl font-semibold">
    <a href="{{ .RelPermalink }}" class="text-primary hover:underline">{{ .Title }}</a>
  </h2>
  {{ with .Date }}<time class="text-sm text-gray-500">{{ .Format "2. January 2006" }}</time>{{ end }}
  {{ with .Summary }}<p class="mt-2 text-gray-700">{{ . }}</p>{{ end }}
</article>
{{ end }}
{{ end }}
