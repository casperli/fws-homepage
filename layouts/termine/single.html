{{ define "main" }}
<div class="page-content">
  {{ with .Parent }}
  <a href="{{ .RelPermalink }}" class="back-link">&larr; {{ .Title }}</a>
  {{ end }}
  {{ with .Params.image }}
  <img src="{{ . }}" alt="{{ $.Title }}" class="event-hero-image">
  {{ end }}
  <h1 class="page-title">{{ .Title }}</h1>
  <div class="prose">
    {{ .Content }}
  </div>
</div>
{{ end }}
